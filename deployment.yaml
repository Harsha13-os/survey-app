apiVersion: apps/v1
kind: Deployment
metadata:
  name: survey-deployment
spec:
  replicas: 3  # To Ensure at least 3 pods run
  selector:
    matchLabels:
      app: survey
  template:
    metadata:
      labels:
        app: survey
    spec:
      containers:
        - name: survey-container
          image: survey
          ports:
            - containerPort: 80
